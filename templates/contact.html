<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Power Platform Automation Portfolio</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    background: #f4f6f8;
    color: #333;
}

header {
    background: #0078D4;
    color: white;
    padding: 40px 20px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 34px;
}

header p {
    margin-top: 10px;
    font-size: 18px;
}

/* Navigation */
nav {
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
}

nav a {
    display: block;
    padding: 15px 25px;
    text-decoration: none;
    color: #0078D4;
    font-weight: bold;
}

nav a:hover {
    background: #f0f4f8;
}

/* Container */
.container {
    max-width: 600px;
    margin: 50px auto;
    padding: 20px;
}

/* Card style */
.card {
    background: white;
    padding: 40px 30px;
    border-radius: 8px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

/* Form Styles */
form {
    display: flex;
    flex-direction: column;
}

form label {
    margin-bottom: 5px;
    font-weight: bold;
}

form input, form textarea {
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 16px;
    width: 100%;
    box-sizing: border-box;
}

form textarea {
    resize: vertical;
    min-height: 120px;
}

form button {
    background: #0078D4;
    color: white;
    border: none;
    padding: 12px 20px;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.2s;
}

form button:hover {
    background: #005a9e;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    margin-top: 40px;
    background: #eaeaea;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
<h1>Contact Me</h1>
<p>Power Platform Automation Portfolio</p>
</header>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact Me</a></li>
</ul>
</nav>

<div class="container">
<div class="card">
<h2>Get In Touch</h2>
<p>Fill out the form below to send me a message.</p>

<form action="/send" method="POST">
  <label>Name:</label>
  <input type="text" name="name" required>
  
  <label>Email:</label>
  <input type="email" name="email" required>
  
  <label>Message:</label>
  <textarea name="message" required></textarea>
  
  <button type="submit">Send</button>
</form>
</div>
</div>

<footer>
<p>© 2026 Power Platform Automation Portfolio</p>
</footer>

</body>
</html>
